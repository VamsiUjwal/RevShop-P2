<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>RevShop - My Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body class="bg-light">
    <!-- Include Header -->
    <div th:replace="~{fragments/header :: header}"></div>

    <div class="container my-5">
        <h2 class="mb-4 fw-bold text-dark"><i class="fa-solid fa-bell text-primary me-2"></i>My Notifications</h2>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <div th:if="${msg}" class="alert alert-success" th:text="${msg}"></div>

        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-0">
                <div class="list-group list-group-flush rounded-4">
                    <div th:if="${notifications == null or notifications.isEmpty()}" class="p-5 text-center text-muted">
                        <i class="fa-regular fa-bell-slash fs-1 mb-3"></i>
                        <h5>No notifications to display</h5>
                    </div>

                    <a th:each="notif : ${notifications}" th:href="@{/notifications/read/{id}(id=${notif.id})}"
                        class="list-group-item list-group-item-action p-4 d-flex justify-content-between align-items-center"
                        th:classappend="${!notif.isRead} ? 'bg-white border-start border-4 border-primary' : 'bg-light text-muted'">
                        <div>
                            <div class="d-flex align-items-center mb-1">
                                <span th:if="${!notif.isRead}" class="badge bg-primary rounded-pill me-2">New</span>
                                <small class="text-secondary"
                                    th:text="${#temporals.format(notif.createdAt, 'MMM dd, yyyy HH:mm')}"></small>
                            </div>
                            <h6 class="mb-0 fs-5"
                                th:classappend="${!notif.isRead} ? 'fw-bold text-dark' : 'fw-normal text-secondary'"
                                th:text="${notif.message}"></h6>
                        </div>
                        <i class="fa-solid fa-chevron-right text-muted"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
